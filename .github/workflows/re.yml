name: Main

on:
  push:
  workflow_dispatch:
    inputs:
      tag:
        description: "输入发布标签，例如 v1.0.0"
        required: true
        default: "v1.0.0"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 👈 关键：给令牌开发布权限
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build
        run: echo ${{ github.sha }} > Release.txt

      - name: Test
        run: cat Release.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: 手动触发构建发布
          files: Release.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
